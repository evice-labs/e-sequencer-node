services:
  node-0:
    build:
      context: ../
      dockerfile: e-sequencer-node/Dockerfile
    container_name: sequencer-node-1
    environment:
      - RUST_LOG=info
    volumes:
      - ./genesis.json:/app/genesis.json:ro
      - ./node_data/node-0:/data
    ports:
      - "9000:9000"
    command: >
      --dev
      --p2p-port 9000
      --genesis /app/genesis.json
      --data-dir /data
      --keystore-path /data/keystore.json
      --password dev-password
    networks:
      - sequencer-net

  node-1:
    build:
